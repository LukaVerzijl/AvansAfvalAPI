name: .NET tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AvansAfvalAPI.sln

      - name: Test
        run: dotnet test AvansAfvalAPI.sln --configuration Release --no-restore --verbosity normal
